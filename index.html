<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI CV Tailor - No API Required</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .animate-spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Initialize PDF.js
        if (typeof pdfjsLib !== 'undefined') {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }

        // Lucide Icons
        const Upload = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
            </svg>
        );

        const FileText = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
            </svg>
        );

        const Sparkles = ({ className }) => (
            <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M12 3v18M3 12h18M6.5 6.5l11 11M17.5 6.5l-11 11"/>
            </svg>
        );

        const Download = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
            </svg>
        );

        const Copy = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
        );

        const Check = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
        );

        const AlertCircle = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
        );

        function CVTailorApp() {
            const [jobDescription, setJobDescription] = useState('');
            const [baseCV, setBaseCV] = useState('');
            const [cvText, setCvText] = useState('');
            const [tailoredCV, setTailoredCV] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [error, setError] = useState('');
            const [copied, setCopied] = useState(false);
            const [uploadType, setUploadType] = useState('latex'); // 'latex' or 'pdf'

            const handleTextFileUpload = (event) => {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => setJobDescription(e.target.result);
                    reader.readAsText(file);
                }
            };

            const handleLatexUpload = (event) => {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        setBaseCV(e.target.result);
                        setCvText('');
                    };
                    reader.readAsText(file);
                }
            };

            const handlePdfUpload = async (event) => {
                const file = event.target.files[0];
                if (!file) return;

                setIsProcessing(true);
                setError('');

                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    let fullText = '';

                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        const pageText = textContent.items.map(item => item.str).join(' ');
                        fullText += pageText + '\n';
                    }

                    setCvText(fullText);
                    setBaseCV('');
                } catch (err) {
                    setError('Failed to extract text from PDF: ' + err.message);
                } finally {
                    setIsProcessing(false);
                }
            };

            const tailorCVManually = () => {
                if (!jobDescription.trim()) {
                    setError('Please provide a job description');
                    return;
                }

                if (!baseCV.trim() && !cvText.trim()) {
                    setError('Please provide your CV (either LaTeX code or PDF)');
                    return;
                }

                setIsProcessing(true);
                setError('');

                // Simulate processing and give user a template to work with
                setTimeout(() => {
                    const cvContent = baseCV || cvText;
                    
                    // Extract key requirements from job description
                    const jdLower = jobDescription.toLowerCase();
                    const hasAnalytics = jdLower.includes('analytics') || jdLower.includes('data');
                    const hasPython = jdLower.includes('python');
                    const hasSQL = jdLower.includes('sql');
                    const hasPowerBI = jdLower.includes('power bi') || jdLower.includes('powerbi');
                    const hasExcel = jdLower.includes('excel');
                    const hasML = jdLower.includes('machine learning') || jdLower.includes('ml');

                    let suggestions = "\\section{Professional Summary}\n";
                    suggestions += "\\small{";
                    
                    if (hasAnalytics) suggestions += "Data analyst with expertise in ";
                    if (hasPython) suggestions += "Python, ";
                    if (hasSQL) suggestions += "SQL, ";
                    if (hasPowerBI) suggestions += "Power BI, ";
                    if (hasExcel) suggestions += "Excel, ";
                    if (hasML) suggestions += "machine learning, ";
                    
                    suggestions = suggestions.replace(/, $/, '');
                    suggestions += ". Experienced in analyzing large datasets and delivering actionable insights.}\n\n";

                    suggestions += "% TAILORING SUGGESTIONS:\n";
                    suggestions += "% 1. Update your Professional Summary to include these keywords:\n";
                    if (hasPython) suggestions += "%    - Python\n";
                    if (hasSQL) suggestions += "%    - SQL\n";
                    if (hasPowerBI) suggestions += "%    - Power BI\n";
                    if (hasExcel) suggestions += "%    - Excel\n";
                    if (hasML) suggestions += "%    - Machine Learning\n";
                    suggestions += "% 2. Reorder your experience bullets to emphasize relevant skills\n";
                    suggestions += "% 3. Add quantifiable achievements related to the job requirements\n\n";

                    if (baseCV) {
                        // If LaTeX provided, insert suggestions at the top
                        setTailoredCV(suggestions + "\n" + baseCV);
                    } else {
                        // If PDF text provided, create a basic template
                        const template = `%-------------------------
% Tailored Resume
% Based on extracted CV content
%------------------------

\\documentclass[letterpaper,10.5pt]{article}
\\usepackage[empty]{fullpage}
\\usepackage{titlesec}
\\usepackage{enumitem}
\\usepackage[hidelinks]{hyperref}
\\usepackage{fontawesome5}
\\usepackage[sfdefault]{roboto}

\\begin{document}

${suggestions}

% EXTRACTED CV CONTENT:
% ${cvText.substring(0, 500)}...
%
% Please create your LaTeX CV structure here using the extracted content above.
% The AI cannot auto-generate this without an API key.
% 
% TIP: Use your original LaTeX file instead of PDF for best results!

\\end{document}`;
                        setTailoredCV(template);
                    }

                    setIsProcessing(false);
                }, 1000);
            };

            const copyToClipboard = () => {
                navigator.clipboard.writeText(tailoredCV);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const downloadTeX = () => {
                const blob = new Blob([tailoredCV], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'tailored_cv.tex';
                a.click();
                URL.revokeObjectURL(url);
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-6">
                    <div className="max-w-7xl mx-auto">
                        {/* Header */}
                        <div className="text-center mb-8">
                            <div className="flex items-center justify-center gap-3 mb-3">
                                <Sparkles className="w-10 h-10 text-indigo-600" />
                                <h1 className="text-4xl font-bold text-gray-800">AI CV Tailor</h1>
                            </div>
                            <p className="text-gray-600 text-lg">No API Required - Works Offline</p>
                        </div>

                        {/* Info Banner */}
                        <div className="bg-blue-50 border-2 border-blue-200 rounded-lg p-4 mb-6 flex items-start gap-3">
                            <AlertCircle />
                            <div className="flex-1">
                                <p className="text-blue-800 font-medium mb-1">How This Works (No API Key Needed):</p>
                                <ul className="text-sm text-blue-700 space-y-1">
                                    <li>• This tool analyzes your job description and provides tailoring suggestions</li>
                                    <li>• <strong>Best option:</strong> Upload your LaTeX CV file (.tex) for direct editing</li>
                                    <li>• <strong>Alternative:</strong> Upload PDF (text extraction only, manual LaTeX editing required)</li>
                                    <li>• Download the tailored .tex file and compile it on Overleaf</li>
                                </ul>
                            </div>
                        </div>

                        {/* Main Content */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                            {/* Job Description Input */}
                            <div className="bg-white rounded-xl shadow-lg p-6">
                                <div className="flex items-center gap-2 mb-4">
                                    <FileText />
                                    <h2 className="text-xl font-semibold text-gray-800">Job Description</h2>
                                </div>
                                <textarea
                                    value={jobDescription}
                                    onChange={(e) => setJobDescription(e.target.value)}
                                    placeholder="Paste the job description here..."
                                    className="w-full h-64 p-4 border-2 border-gray-200 rounded-lg focus:border-indigo-500 focus:outline-none resize-none font-mono text-sm"
                                />
                                <div className="mt-4">
                                    <label className="flex items-center justify-center gap-2 px-4 py-2 bg-indigo-50 text-indigo-600 rounded-lg hover:bg-indigo-100 cursor-pointer transition-colors">
                                        <Upload />
                                        <span>Upload from file</span>
                                        <input
                                            type="file"
                                            accept=".txt,.md"
                                            onChange={handleTextFileUpload}
                                            className="hidden"
                                        />
                                    </label>
                                </div>
                            </div>

                            {/* Base CV Input */}
                            <div className="bg-white rounded-xl shadow-lg p-6">
                                <div className="flex items-center gap-2 mb-4">
                                    <FileText />
                                    <h2 className="text-xl font-semibold text-gray-800">Your CV</h2>
                                </div>

                                {/* Upload Type Toggle */}
                                <div className="flex gap-2 mb-4">
                                    <button
                                        onClick={() => setUploadType('latex')}
                                        className={`flex-1 px-4 py-2 rounded-lg font-medium transition-colors ${
                                            uploadType === 'latex'
                                                ? 'bg-green-600 text-white'
                                                : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                                        }`}
                                    >
                                        LaTeX (.tex)
                                    </button>
                                    <button
                                        onClick={() => setUploadType('pdf')}
                                        className={`flex-1 px-4 py-2 rounded-lg font-medium transition-colors ${
                                            uploadType === 'pdf'
                                                ? 'bg-green-600 text-white'
                                                : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                                        }`}
                                    >
                                        PDF
                                    </button>
                                </div>

                                {uploadType === 'latex' ? (
                                    <>
                                        <textarea
                                            value={baseCV}
                                            onChange={(e) => setBaseCV(e.target.value)}
                                            placeholder="Paste your LaTeX CV code here or upload .tex file below..."
                                            className="w-full h-56 p-4 border-2 border-gray-200 rounded-lg focus:border-green-500 focus:outline-none resize-none font-mono text-sm"
                                        />
                                        <div className="mt-4">
                                            <label className="flex items-center justify-center gap-2 px-4 py-2 bg-green-50 text-green-600 rounded-lg hover:bg-green-100 cursor-pointer transition-colors">
                                                <Upload />
                                                <span>Upload .tex file</span>
                                                <input
                                                    type="file"
                                                    accept=".tex"
                                                    onChange={handleLatexUpload}
                                                    className="hidden"
                                                />
                                            </label>
                                        </div>
                                    </>
                                ) : (
                                    <>
                                        <div className="h-56 border-2 border-dashed border-gray-300 rounded-lg flex flex-col items-center justify-center p-4">
                                            {cvText ? (
                                                <div className="text-center">
                                                    <Check />
                                                    <p className="text-green-600 font-medium mt-2">PDF uploaded successfully!</p>
                                                    <p className="text-sm text-gray-600 mt-1">
                                                        {cvText.split(' ').length} words extracted
                                                    </p>
                                                </div>
                                            ) : (
                                                <>
                                                    <FileText />
                                                    <p className="text-gray-600 mt-2 text-center">
                                                        Upload your CV in PDF format
                                                    </p>
                                                    <p className="text-sm text-gray-500 mt-1">
                                                        Text will be extracted automatically
                                                    </p>
                                                </>
                                            )}
                                        </div>
                                        <div className="mt-4">
                                            <label className="flex items-center justify-center gap-2 px-4 py-2 bg-green-50 text-green-600 rounded-lg hover:bg-green-100 cursor-pointer transition-colors">
                                                <Upload />
                                                <span>Upload PDF</span>
                                                <input
                                                    type="file"
                                                    accept=".pdf"
                                                    onChange={handlePdfUpload}
                                                    className="hidden"
                                                />
                                            </label>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>

                        {/* Generate Button */}
                        <div className="flex justify-center mb-6">
                            <button
                                onClick={tailorCVManually}
                                disabled={isProcessing || !jobDescription.trim() || (!baseCV.trim() && !cvText.trim())}
                                className="flex items-center gap-3 px-8 py-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-xl font-semibold text-lg hover:from-indigo-700 hover:to-purple-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-lg hover:shadow-xl"
                            >
                                <Sparkles className={isProcessing ? 'animate-spin' : ''} />
                                {isProcessing ? 'Processing...' : 'Generate Tailoring Suggestions'}
                            </button>
                        </div>

                        {/* Error Message */}
                        {error && (
                            <div className="bg-red-50 border-2 border-red-200 rounded-lg p-4 mb-6">
                                <p className="text-red-700 font-medium">{error}</p>
                            </div>
                        )}

                        {/* Output */}
                        {tailoredCV && (
                            <div className="bg-white rounded-xl shadow-lg p-6">
                                <div className="flex items-center justify-between mb-4">
                                    <div className="flex items-center gap-2">
                                        <FileText />
                                        <h2 className="text-xl font-semibold text-gray-800">
                                            {baseCV ? 'Tailored CV with Suggestions' : 'CV Template with Extracted Content'}
                                        </h2>
                                    </div>
                                    <div className="flex gap-2">
                                        <button
                                            onClick={copyToClipboard}
                                            className="flex items-center gap-2 px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition-colors"
                                        >
                                            {copied ? <Check /> : <Copy />}
                                            {copied ? 'Copied!' : 'Copy'}
                                        </button>
                                        <button
                                            onClick={downloadTeX}
                                            className="flex items-center gap-2 px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition-colors"
                                        >
                                            <Download />
                                            Download .tex
                                        </button>
                                    </div>
                                </div>
                                <textarea
                                    value={tailoredCV}
                                    onChange={(e) => setTailoredCV(e.target.value)}
                                    className="w-full h-96 p-4 border-2 border-gray-200 rounded-lg bg-gray-50 font-mono text-sm resize-none"
                                />
                                <div className="mt-4 p-4 bg-yellow-50 border border-yellow-200 rounded-lg">
                                    <p className="text-sm text-yellow-800">
                                        <strong>Next Steps:</strong>
                                    </p>
                                    <ol className="list-decimal list-inside text-sm text-yellow-800 mt-2 space-y-1">
                                        <li>Review the suggestions in the code above</li>
                                        <li>Edit the LaTeX code to apply the recommendations</li>
                                        <li>Download the .tex file</li>
                                        <li>Upload to Overleaf and compile to PDF</li>
                                    </ol>
                                </div>
                            </div>
                        )}

                        {/* Instructions */}
                        <div className="mt-8 bg-white rounded-xl shadow-lg p-6">
                            <h3 className="text-lg font-semibold text-gray-800 mb-3">How to Use (No API Key Required):</h3>
                            <ol className="list-decimal list-inside space-y-2 text-gray-600">
                                <li>Paste or upload the job description</li>
                                <li>Choose upload type:
                                    <ul className="list-disc list-inside ml-6 mt-1 space-y-1">
                                        <li><strong>LaTeX (.tex):</strong> Paste or upload your LaTeX CV code (recommended)</li>
                                        <li><strong>PDF:</strong> Upload PDF and text will be extracted</li>
                                    </ul>
                                </li>
                                <li>Click "Generate Tailoring Suggestions"</li>
                                <li>Review the tailoring suggestions and edit as needed</li>
                                <li>Download the .tex file</li>
                                <li>Compile on Overleaf to get your PDF</li>
                            </ol>
                            <div className="mt-4 p-4 bg-green-50 rounded-lg">
                                <p className="text-sm text-green-800">
                                    <strong>✅ Why LaTeX Upload is Better:</strong>
                                </p>
                                <ul className="list-disc list-inside text-sm text-green-800 mt-2 space-y-1">
                                    <li>Preserves all formatting and structure</li>
                                    <li>Allows direct editing of your existing CV</li>
                                    <li>No need to rebuild LaTeX structure from scratch</li>
                                    <li>Much faster and more accurate</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<CVTailorApp />, document.getElementById('root'));
    </script>
</body>
</html>
