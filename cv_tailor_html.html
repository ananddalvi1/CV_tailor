<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI CV Tailor - Job Description to PDF</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .animate-spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Lucide Icons as SVG components
        const Upload = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
            </svg>
        );

        const FileText = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
            </svg>
        );

        const Sparkles = ({ className }) => (
            <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M12 3v18M3 12h18M6.5 6.5l11 11M17.5 6.5l-11 11"/>
            </svg>
        );

        const Download = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
            </svg>
        );

        const Copy = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
        );

        const Check = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
        );

        function CVTailorApp() {
            const [jobDescription, setJobDescription] = useState('');
            const [baseCV, setBaseCV] = useState('');
            const [tailoredCV, setTailoredCV] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [isCompiling, setIsCompiling] = useState(false);
            const [error, setError] = useState('');
            const [copied, setCopied] = useState(false);
            const [pdfUrl, setPdfUrl] = useState('');

            const handleFileUpload = (event, setFunction) => {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => setFunction(e.target.result);
                    reader.readAsText(file);
                }
            };

            const generateTailoredCV = async () => {
                if (!jobDescription.trim() || !baseCV.trim()) {
                    setError('Please provide both job description and base CV');
                    return;
                }

                setIsLoading(true);
                setError('');
                setTailoredCV('');
                setPdfUrl('');

                try {
                    const response = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            model: 'claude-sonnet-4-20250514',
                            max_tokens: 4000,
                            messages: [{
                                role: 'user',
                                content: `You are an expert CV tailoring assistant. You will be given a job description and a base LaTeX CV. Your task is to tailor the CV to match the job requirements while keeping all information honest and accurate.

CRITICAL RULES:
1. Keep the CV to EXACTLY 1 page - adjust spacing, not content
2. NEVER invent or exaggerate experiences
3. Only modify the Professional Summary to align with the job
4. Reorder or emphasize relevant skills/experiences
5. Use keywords from the job description naturally
6. Maintain the exact same LaTeX structure and formatting
7. Keep all personal details, dates, and achievements unchanged
8. Output ONLY the complete LaTeX code, no explanations

JOB DESCRIPTION:
${jobDescription}

BASE CV (LaTeX):
${baseCV}

Generate the tailored LaTeX CV now:`
                            }]
                        })
                    });

                    const data = await response.json();
                    
                    if (data.content && data.content.length > 0) {
                        const cvText = data.content
                            .filter(block => block.type === 'text')
                            .map(block => block.text)
                            .join('\n');
                        
                        const cleanCV = cvText.replace(/```latex\n?/g, '').replace(/```\n?/g, '').trim();
                        setTailoredCV(cleanCV);
                    } else {
                        setError('Failed to generate CV. Please try again.');
                    }
                } catch (err) {
                    setError('Error generating CV: ' + err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            const compileToPDF = async () => {
                if (!tailoredCV.trim()) {
                    setError('Please generate a CV first');
                    return;
                }

                setIsCompiling(true);
                setError('');
                setPdfUrl('');

                try {
                    // Using LaTeX.Online API for compilation
                    const response = await fetch('https://latexonline.cc/compile?text=' + encodeURIComponent(tailoredCV), {
                        method: 'GET',
                    });

                    if (response.ok) {
                        const blob = await response.blob();
                        const url = URL.createObjectURL(blob);
                        setPdfUrl(url);
                    } else {
                        setError('PDF compilation failed. Please check your LaTeX code or use the .tex file with Overleaf.');
                    }
                } catch (err) {
                    setError('Error compiling PDF: ' + err.message + '. Try downloading .tex and using Overleaf instead.');
                } finally {
                    setIsCompiling(false);
                }
            };

            const copyToClipboard = () => {
                navigator.clipboard.writeText(tailoredCV);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const downloadTeX = () => {
                const blob = new Blob([tailoredCV], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'tailored_cv.tex';
                a.click();
                URL.revokeObjectURL(url);
            };

            const downloadPDF = () => {
                if (pdfUrl) {
                    const a = document.createElement('a');
                    a.href = pdfUrl;
                    a.download = 'tailored_cv.pdf';
                    a.click();
                }
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-6">
                    <div className="max-w-7xl mx-auto">
                        {/* Header */}
                        <div className="text-center mb-8">
                            <div className="flex items-center justify-center gap-3 mb-3">
                                <Sparkles className="w-10 h-10 text-indigo-600" />
                                <h1 className="text-4xl font-bold text-gray-800">AI CV Tailor</h1>
                            </div>
                            <p className="text-gray-600 text-lg">Upload job description → Get tailored LaTeX CV → Download PDF</p>
                        </div>

                        {/* Main Content */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                            {/* Job Description Input */}
                            <div className="bg-white rounded-xl shadow-lg p-6">
                                <div className="flex items-center gap-2 mb-4">
                                    <FileText />
                                    <h2 className="text-xl font-semibold text-gray-800">Job Description</h2>
                                </div>
                                <textarea
                                    value={jobDescription}
                                    onChange={(e) => setJobDescription(e.target.value)}
                                    placeholder="Paste the job description here..."
                                    className="w-full h-64 p-4 border-2 border-gray-200 rounded-lg focus:border-indigo-500 focus:outline-none resize-none font-mono text-sm"
                                />
                                <div className="mt-4">
                                    <label className="flex items-center justify-center gap-2 px-4 py-2 bg-indigo-50 text-indigo-600 rounded-lg hover:bg-indigo-100 cursor-pointer transition-colors">
                                        <Upload />
                                        <span>Upload from file</span>
                                        <input
                                            type="file"
                                            accept=".txt,.md"
                                            onChange={(e) => handleFileUpload(e, setJobDescription)}
                                            className="hidden"
                                        />
                                    </label>
                                </div>
                            </div>

                            {/* Base CV Input */}
                            <div className="bg-white rounded-xl shadow-lg p-6">
                                <div className="flex items-center gap-2 mb-4">
                                    <FileText />
                                    <h2 className="text-xl font-semibold text-gray-800">Base CV (LaTeX)</h2>
                                </div>
                                <textarea
                                    value={baseCV}
                                    onChange={(e) => setBaseCV(e.target.value)}
                                    placeholder="Paste your base LaTeX CV code here..."
                                    className="w-full h-64 p-4 border-2 border-gray-200 rounded-lg focus:border-green-500 focus:outline-none resize-none font-mono text-sm"
                                />
                                <div className="mt-4">
                                    <label className="flex items-center justify-center gap-2 px-4 py-2 bg-green-50 text-green-600 rounded-lg hover:bg-green-100 cursor-pointer transition-colors">
                                        <Upload />
                                        <span>Upload .tex file</span>
                                        <input
                                            type="file"
                                            accept=".tex"
                                            onChange={(e) => handleFileUpload(e, setBaseCV)}
                                            className="hidden"
                                        />
                                    </label>
                                </div>
                            </div>
                        </div>

                        {/* Generate Button */}
                        <div className="flex justify-center mb-6">
                            <button
                                onClick={generateTailoredCV}
                                disabled={isLoading || !jobDescription.trim() || !baseCV.trim()}
                                className="flex items-center gap-3 px-8 py-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-xl font-semibold text-lg hover:from-indigo-700 hover:to-purple-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-lg hover:shadow-xl"
                            >
                                <Sparkles className={isLoading ? 'animate-spin' : ''} />
                                {isLoading ? 'Tailoring Your CV...' : 'Generate Tailored CV'}
                            </button>
                        </div>

                        {/* Error Message */}
                        {error && (
                            <div className="bg-red-50 border-2 border-red-200 rounded-lg p-4 mb-6">
                                <p className="text-red-700 font-medium">{error}</p>
                            </div>
                        )}

                        {/* Output */}
                        {tailoredCV && (
                            <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                                <div className="flex items-center justify-between mb-4">
                                    <div className="flex items-center gap-2">
                                        <FileText />
                                        <h2 className="text-xl font-semibold text-gray-800">Tailored CV (LaTeX)</h2>
                                    </div>
                                    <div className="flex gap-2">
                                        <button
                                            onClick={copyToClipboard}
                                            className="flex items-center gap-2 px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition-colors"
                                        >
                                            {copied ? <Check /> : <Copy />}
                                            {copied ? 'Copied!' : 'Copy'}
                                        </button>
                                        <button
                                            onClick={downloadTeX}
                                            className="flex items-center gap-2 px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition-colors"
                                        >
                                            <Download />
                                            Download .tex
                                        </button>
                                    </div>
                                </div>
                                <textarea
                                    value={tailoredCV}
                                    readOnly
                                    className="w-full h-96 p-4 border-2 border-gray-200 rounded-lg bg-gray-50 font-mono text-sm resize-none"
                                />
                            </div>
                        )}

                        {/* Compile to PDF Button */}
                        {tailoredCV && (
                            <div className="flex justify-center mb-6">
                                <button
                                    onClick={compileToPDF}
                                    disabled={isCompiling}
                                    className="flex items-center gap-3 px-8 py-4 bg-gradient-to-r from-green-600 to-emerald-600 text-white rounded-xl font-semibold text-lg hover:from-green-700 hover:to-emerald-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-lg hover:shadow-xl"
                                >
                                    <Download />
                                    {isCompiling ? 'Compiling to PDF...' : 'Compile to PDF'}
                                </button>
                            </div>
                        )}

                        {/* PDF Preview */}
                        {pdfUrl && (
                            <div className="bg-white rounded-xl shadow-lg p-6">
                                <div className="flex items-center justify-between mb-4">
                                    <h2 className="text-xl font-semibold text-gray-800">PDF Preview</h2>
                                    <button
                                        onClick={downloadPDF}
                                        className="flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors"
                                    >
                                        <Download />
                                        Download PDF
                                    </button>
                                </div>
                                <iframe
                                    src={pdfUrl}
                                    className="w-full h-[600px] border-2 border-gray-200 rounded-lg"
                                    title="PDF Preview"
                                />
                            </div>
                        )}

                        {/* Instructions */}
                        <div className="mt-8 bg-white rounded-xl shadow-lg p-6">
                            <h3 className="text-lg font-semibold text-gray-800 mb-3">How to Use:</h3>
                            <ol className="list-decimal list-inside space-y-2 text-gray-600">
                                <li>Paste or upload the job description</li>
                                <li>Paste or upload your base LaTeX CV code</li>
                                <li>Click "Generate Tailored CV"</li>
                                <li><strong>Option 1:</strong> Click "Compile to PDF" to get instant PDF</li>
                                <li><strong>Option 2:</strong> Download .tex file and compile on Overleaf</li>
                            </ol>
                            <div className="mt-4 p-4 bg-blue-50 rounded-lg">
                                <p className="text-sm text-blue-800">
                                    <strong>💡 Tips:</strong>
                                </p>
                                <ul className="list-disc list-inside text-sm text-blue-800 mt-2 space-y-1">
                                    <li>The AI keeps all your information honest and accurate</li>
                                    <li>If PDF compilation fails, download .tex and use Overleaf (more reliable)</li>
                                    <li>The online compiler may timeout for complex CVs - use Overleaf in that case</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<CVTailorApp />, document.getElementById('root'));
    </script>
</body>
</html>
